<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星語劇場</title>
    <style>
        /* 基礎樣式與首頁背景 */
        body { 
            margin: 0; 
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090a1f 100%); 
            color: #ddd; 
            font-family: serif; 
            line-height: 1.8; 
            overflow-x: hidden; 
            min-height: 100vh; 
        }
        
/* --- 修改重點 1: 模糊背景圖片層 --- */
        .bg-blur-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* 位於最底層 */
            overflow: hidden;
            transition: opacity 0.5s ease-in-out;
        }
        .bg-blur-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 模糊、降低亮度並設定初始透明度 */
            filter: blur(30px) brightness(0.5); 
            opacity: 0.9;
            transition: opacity 0.5s ease-in-out;
        }

        /* 背景粒子與軌道動態 */
        .stars-container, .orbit-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: flowing-right var(--duration) linear infinite; }
        @keyframes flowing-right { 0% { transform: translateX(0); opacity: 0; } 10% { opacity: 0.5; } 100% { transform: translateX(110vw); opacity: 0; } }
        .orbit { position: absolute; top: 50%; left: 50%; border: 1px solid rgba(162, 155, 254, 0.2); border-radius: 50%; border-right-color: transparent !important; animation: rotate var(--speed) linear infinite; }
        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* 故事容器 */
        .container { 
            max-width: 800px; 
            margin: 60px auto; 
            padding: 40px; 
            background: rgba(10, 10, 10, 0.7); 
            backdrop-filter: blur(15px); 
            border-radius: 20px; 
            border: 1px solid rgba(162, 155, 254, 0.1); 
            position: relative; 
            z-index: 10; 
        }
        
        .location-tag { color: #a29bfe; font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 10px; display: block; text-align: center; height: 1.2rem; }
        h1 { font-weight: 100; letter-spacing: 5px; margin-bottom: 20px; text-align: center; min-height: 1.2em; }

        /* 圖片放置區塊與 16:9 優化 */
        .story-img { 
            width: 100%; 
            aspect-ratio: 16 / 9; /* 針對 1920*1080 圖片進行比例優化 */
            height: auto; 
            background: #1a1a1a; 
            margin: 20px 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid rgba(162, 155, 254, 0.2);
        }

        /* --- 修改重點 1: CSS 淡入淡出基礎設定 --- */
        .story-img img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            opacity: 1; /* 初始全亮 */
            transition: opacity 0.5s ease-in-out; /* 設定 0.5 秒透明度過渡 */
        }

        /* 當圖片帶有此 class 時會變透明 */
        .story-img img.fade-out { 
            opacity: 0 !important; 
        }

        .event-desc { font-size: 1.1rem; margin: 30px 0; white-space: pre-wrap; }

        /* 選項按鈕 */
        .options-grid { display: grid; gap: 15px; }
        .option-btn { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 253, 231, 0.2); 
            color: #ccc; 
            padding: 18px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-family: serif; 
            font-size: 1rem; 
            transition: 0.3s; 
            text-align: left; 
        }
        .option-btn:hover { 
            color: #fffde7; 
            border-color: #fffde7; 
            text-shadow: 0 0 10px #fff9c4; 
            background: rgba(255, 253, 231, 0.1); 
            transform: translateX(10px); 
        }

        .back-home { position: fixed; left: 30px; top: 30px; color: #a29bfe; text-decoration: none; font-weight: 100; z-index: 100; }
    </style>
</head>
<body>

    <div class="bg-blur-container" id="bg-image-box">
    <img id="bg-img-el" src="" alt="">
    </div>

    <div class="stars-container" id="stars"></div>
    <div class="orbit-container" id="orbit-field"></div>
    <a href="index.html" class="back-home">← 返回星盤</a>

    <div class="container">
        <div id="story-view">
            <span class="location-tag" id="loc-display"></span>
            <h1 id="title-display"></h1>
            
            <div class="story-img">
                <img id="chapter-img" src="" alt="">
            </div>

            <div class="event-desc" id="desc-display"></div>
            <div class="options-grid" id="options-container"></div>
        </div>

        <div id="ending-screen" style="display: none; text-align: center;">
            <h1 id="end-title"></h1>
            <div class="story-img">
                <img id="end-img" src="" alt="">
            </div>
            <p id="end-type" style="color: #a29bfe; font-size: 1.2rem;"></p>
            <div class="event-desc" id="end-desc"></div>
            <button class="option-btn" onclick="location.reload()" style="text-align: center; margin-top: 30px;">重新開啟命盤</button>
        </div>
    </div>

    <script>
        // 初始化背景動態
        function initBg() {
            const sc = document.getElementById('stars');
            for(let i=0; i<80; i++){
                let s = document.createElement('div');
                s.className = 'star';
                s.style.top = Math.random()*100+'%';
                s.style.width = s.style.height = Math.random()*3+'px';
                s.style.left = -20+'px';
                s.style.setProperty('--duration', (Math.random()*20+15)+'s');
                s.style.animationDelay = -Math.random()*20+'s';
                sc.appendChild(s);
            }
            const obf = document.getElementById('orbit-field');
            for(let i=0; i<6; i++){
                let o = document.createElement('div');
                o.className = 'orbit';
                let size = 400 + i*250;
                o.style.width = o.style.height = size+'px';
                o.style.setProperty('--speed', (30+i*15)+'s');
                obf.appendChild(o);
            }
        }

        // 故事資料（這裡使用網路佔位圖示意比例）
        const questions = [
            { id: 1, loc: "命宮", star: "無", title: "第一章", img: "images/1.png", desc: "你掉到一個未知的黑暗地方，四周迷霧繚繞，唯有前面的一束光閃爍著，似乎是唯一一個出口...", options: ["憑什麼要我出去", "順著光走", "不出去，我就躺"], target: [101, 2, 101] },
            { id: 2, loc: "命宮", star: "紫微", title: "第二章", img: "images/2-3.png", desc: "伴隨著你穿越的那刻閃爍著，剛睜開眼，便見一位穿著尊貴的女性憑空出現，聲音凜冽卻帶著威嚴，她說道「我是紫微，乃是掌管北斗主星之主。這裡是十二宮位中之一宮 – 命宮」，問道「凡人啊，你可知，這次是為了什麼而來？」", options: ["沒有特別想要的", "只求能出去", "（我怎麼知道）"], target: [3, 3, 3] },
            { id: 3, loc: "命宮", star: "紫微", title: "第三章", img: "images/2-3.png", desc: "紫微了解了來意後，便說道「我雖然不能與你踏上旅程，但還是能給予你祝福，幫助你的冒險。你想要哪個東西呢？」", options: ["名為英雄的披風", "百戰百勝的劍", "無盡底的錢包"], target: [4, 4, 4] },
            { id: 4, loc: "父母宮", star: "天梁", title: "第四章", img: "images/4.png", desc: "接下祝福後，你踏上了旅程。又走了一段路，有點累了，便找了個有水源，旁邊又有野莓果的樹下休息。這時，身旁一座不起眼，長滿青苔的老者石像突然開口說話：「好心人啊，你能不能…幫我…擦拭下身體呢？如你所見，多年沒人幫我清理了，你能否幫幫我呢？」", options: ["熱心幫忙清理乾淨", "簡單把青苔弄下便繼續休息", "這什麼石像啊，無視好了"], target: [5, 5, 5] },
            { id: 5, loc: "父母宮", star: "天梁", title: "第五章", img: "images/5.png", desc: "在你準備繼續出發時，石像突然震動了下，隨後一道靈便從石像中現身，靈並不是如老者石像般，而是亭亭玉立的少女。她拿出了一個果實遞給你：「算我多管閒事吧，這是長壽果，很珍貴的，吃了能消災解厄。看你也不大聰明，怕你容易被騙，就當見面禮給你吧。」", options: ["大口吃掉", "留著以後不時之需", "送給路邊乞丐，狗都不吃陌生人的禮物"], target: [6, 6, 6] },
            { id: 6, loc: "福德宮", star: "天同", title: "第六章", img: "images/6.png", desc: "接下長壽果後，轉身要啟程，景色卻在剎那之間變成其他場景，眼前出現了一座樂園，入口長的招搖奔放，寫著大大的福德樂園。進去後繞了一圈，卻發現自己一直回到一樣的位置。「吶？那邊那個，陪我玩吧，我還有其他甜點能給你吃喔！」，一道聲音從上方而來，一名少女拿著泡芙，正從天空降到你面前。", options: ["我還不吃爆", "先婉拒，太來路不明了吧", "搶她的來吃"], target: [101, 7, 7] },
            { id: 7, loc: "福德宮", star: "天同", title: "第七章", img: "images/7.png", desc: "少女說她名為天同，是這裡的主人，只有跟她玩夠了她才考慮放你走，於是你只能耐心地先陪她，至少等她願意鬆口說放你出去。於是從白天玩到了黃昏，最後她終於有些玩累了，給你指著兩條路「一條是漂亮的花海，一條是有荊棘的路，你自己選吧。」", options: ["花海", "刀山", "原地踏步"], target: [8, 8, 8] },
            { id: 8, loc: "田宅宮", star: "天府", title: "第八章", img: "images/8.png", desc: "經過一段長路，白天的經歷實在讓你精疲力盡，此時天不做美，竟又下起雨來，幸好前方遇到了座塔樓，急忙進去避雨。塔樓裡靜悄悄的，腳步聲迴盪之間，抬頭往上看去竟突然出現了一人。他說道「看來來了位客人呢。」，話完他又瞬間移動到了你面前，「鄙人乃是天府星，閣下若是想進塔避雨，可否幫鄙人處理此處後山的雜物呢？」", options: ["積極快速地去幫忙整理", "稍微簡單弄就好", "乾脆直接出去淋雨"], target: [9, 9, 9] },
            { id: 9, loc: "田宅宮", star: "天府", title: "第九章", img: "images/9.png", desc: "雨過天晴，出了個大太陽，似乎在祝福你的旅程。準備出發之前，天府同你問了個問題「看閣下覺得有緣份，若城堡財寶與自由只能選其一，你會留下什麼？」", options: ["當然是財寶啦！", "自由就在門之外，為何不選", "我全都要"], target: [10, 10, 10] },
            { id: 10, loc: "宮祿宮", star: "天相", title: "第十章", img: "images/10.png", desc: "離開塔樓後，走走看看就到一個像冒險公會中心的地方，要繼續往前走卻被攔住了，原來是前方有妖怪出現，為了保護旅人，先暫時將那條路封了起來。你心想也沒有其他可繞的路，就想自己做擔保說自己不怕，要拿出入許可。辦公室內公文如山，公會長天相聽完後，見勸不動你，便直接說「印章不見了，你要的我辦不了，除非你幫我找出來。」", options: ["耐心地找印章", "偷溜出去就好", "幫他蓋假章就好了"], target: [11, 11, 11] },
            { id: 11, loc: "宮祿宮", star: "武曲", title: "第十一章", img: "images/11.png", desc: "總算是出來了，卻發現他們居然在這設了訓練場，要通過教官武曲才能成功出去。武曲也不問，他早就聽天相給的消息知道了你，他冷冷看著：「這裡廢物出不去。拿出本事，證明你不是混日子的。」", options: ["展示自身僅有的武力", "展示金錢的力量", "裝死躲避"], target: [12, 12, 12] },
            { id: 12, loc: "宮祿宮", star: "武曲", title: "第十二章", img: "images/12.png", desc: "通過了測驗後，武曲給了你一塊帶著金光的圓牌，說這個是暢通公會出入口的名牌，但也可以跟公會換一次稀有物，讓你自行收著就好。", options: ["買好東西走起", "謝絕", "問他還有沒有更多"], target: [13, 13, 13] },
            { id: 13, loc: "奴僕宮", star: "巨門", title: "第十三章", img: "images/13.png", desc: "周圍迷霧環繞，暗得不像話，「你出不去的…不要想走了……而且這一路上多累阿…你就沒想過是他們害你出不去的嗎？」如同煙霧般的暗幽幽的聲音在你耳邊響起，面前出現了一道巨大的門，緩緩地打開，裡面是伸手不見五指的黑暗，「…就留在這裡難道不好嗎？」，彷彿要將你捲入…", options: ["反駁聲音，相信自己所見的", "保持沈默，冷靜分析", " 直接發瘋，開始亂吼"], target: [14, 14, 14] },
            { id: 14, loc: "奴僕宮", star: "巨門", title: "第十四章", img: "images/14.png", desc: "巨門第一次見嚇不著的人，便著急的逃跑了，還落下了一把鑰匙，看著還有些生鏽。", options: [" 撿起來收著", " 毫不猶豫踢走", "我懷疑是陷阱…"], target: [15, 15, 15] },
            { id: 15, loc: "遷移宮", star: "天機", title: "第十五章", img: "images/15.png", desc: "那人說她名為天機，原本只是為了調查巨門，卻沒想到被捲入其中。得知了你是為了找到出口才踏上旅程的，她便說她有一個還在實驗階段的道具，也許可以直接送你到出口，但就是要看機率，也不穩定。道具開啟後，路徑卻瘋狂變換，天機盡力的計算著：「變數太快了！出口十秒後就會消失！」", options: ["相信直覺衝進去就對了", "嘗試幫她", "算了，消失就消失"], target: [16, 16, 16] },
            { id: 16, loc: "遷移宮", star: "天機", title: "第十六章", img: "images/16.png", desc: "裡面的空間場景不斷變換，「道具好像有點操作過度，現在卡住了，好像只能將你送到附近，但我也不知道現在出去的話會到哪裡…」她抱歉地說道。", options: ["人生就是賭博", "先隨便丟個東西測試吧", "等它穩定吧，不然感覺試試就逝逝"], target: [17, 17, 17] },
            { id: 17, loc: "疾厄宮", star: "廉貞", title: "第十七章", img: "images/17.png", desc: "出去後，好像來到了一個像監牢般的地方，紅光壟罩著，警鈴聲作響。天機跟你一起逃跑，但她卻不小心摔了一跤，被追兵抓住了。一位看似典獄長的人不疾不徐地走了過來，令人將她作為人質。「是她害你進來這裡的吧，你可有意原諒她？」", options: ["原諒，她只是想幫我而已", "再看看吧", "不原諒，她害我跑這麼累"], target: [18, 18, 18] },
            { id: 18, loc: "疾厄宮", star: "廉貞", title: "第十八章", img: "images/18.png", desc: "她打了聲響指，空間瞬間便到了審問台前，上面的名牌寫著廉貞兩字。她令人端上兩杯顏色詭異的飲品，微笑著說「罪名擅闖監牢，但看在你是無意的，給你一次選擇的機會吧。選一杯，喝下去，或者留下靈魂。」", options: ["選一杯大膽喝掉", "假喝騙看看", "橫豎都是一條命，都喝了"], target: [19, 19, 19] },
            { id: 19, loc: "財帛宮", star: "太陰", title: "第十九章", img: "images/19.png", desc: " 喝下飲品後一陣暈眩，再次睜眼時自己已經在外了。坐起身看著四周，這裡似乎是一個花園，身旁坐著一個女孩，見我清醒她很高興地說道「太好了，你終於醒啦！你剛剛忽然出現在這裡，好像中毒了，就先幫你解毒了。」。她說她叫太陰，我想感謝她為我解毒，但被拒絕了，推拖不下，便只邀請我與她一同在月光下散步。散步隨口聊著，她問：「你對月亮的想法是什麼呢？我很好奇。」", options: ["月色很美", "比起月亮更喜歡太陽", "覺得沒什麼意思"], target: [20, 20, 20] },
            { id: 20, loc: "財帛宮", star: "太陰", title: "第二十章", img: "images/20.png", desc: "太陰甜甜笑著說道：「謝謝你陪我散步，跟你聊天很開心，這是給你的禮物，月光下淬煉出的珍珠，它可以幫你映出最真實的一切，我也祝你接下來一路順風。」", options: ["開心戴上", "找個地方賣掉", "隨手弄丟"], target: [21, 21, 21] },
            { id: 21, loc: "子女宮", star: "貪狼", title: "第二十一章", img: "images/4.png", desc: "你來到一個燈紅酒綠的地方，人們隨著音樂狂歡縱慾，你想找個人搭話，卻在轉眼之間，所有人都變成跟你一模一樣的臉孔，各種的表情。努力穿越人群終於找到了一個穿著不同的人，向它搭肩，轉頭卻還是自己的臉，「它」用著你的臉嘻笑著，像是找到好玩的事物。「歡迎來到這個無聊地最好玩的地方，終於來了個新人，我們一起玩吧！」", options: ["加入一起狂歡", "淡定路過", "先混進去偷情報"], target: [22, 22, 22] },
            { id: 22, loc: "子女宮", star: "貪狼", title: "第二十二章", img: "images/4.png", desc: "看著自己的臉各式各樣的表情，感覺有趣，卻又有點毛。「它」看我好奇，也算是熱情的介紹「這叫千人相，是很厲害的幻術喔，只有我等貪狼大人才會，如何？你要不留在這陪我，我就教你！反正這裡比外面什麼破花園好玩多了，不是嗎？」", options: ["學，但也要跑", "拒絕它", "先混進去偷情報"], target: [23, 23, 23] },
            { id: 23, loc: "夫妻宮", star: "太陽", title: "第二十三章", img: "images/4.png", desc: "你還沒回答，一到炙熱的陽光便照進這裡，還沒看見人就聽見了聲音，「我聞到太陰的味道了，出來！是太陰嗎？還是其他人？是誰見到了她？還是綁了她不然她不可能來這種地方！」她以飛快的速度講著，不，喊著。你想回答，但太陽光太亮又高溫。", options: ["頂著這些穿越去找她", "拿貪狼擋在前面", "太亮了我先躲一下"], target: [24, 24, 24] },

        // 僅更換內容的純函數
        function updateContent(qIdx) {
            const q = questions.find(item => item.id === qIdx);
            if(!q) return;

            document.getElementById('loc-display').innerText = `【 ${q.loc} 】 遇見：${q.star}`;
            document.getElementById('title-display').innerText = q.title;
            document.getElementById('chapter-img').src = q.img;
            document.getElementById('bg-img-el').src = q.img;
            document.getElementById('desc-display').innerText = q.desc;

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => handleOptionClick(q.target[i]);
                container.appendChild(btn);
            });
        }

        // --- 修改重點 2: JavaScript 轉場流程控制 ---
        function handleOptionClick(nextId) {
            window.scrollTo({ top: 0, behavior: 'smooth' }); // 平滑捲動回頂部

            if (nextId >= 100) {
                // 如果是結局，直接跳轉，不需要淡入淡出插圖
                showEnding(nextId);
            } else {
                const imgEl = document.getElementById('chapter-img');
                
                // 開始過渡流程
                // 1. Fade Out: 加上 class，讓舊圖片花 0.5 秒變透明
                imgEl.classList.add('fade-out');

                // 2. 切換內容: 等待 0.5 秒（CSS 過渡結束時）
                setTimeout(() => {
                    // 在幕後（圖片透明時）更換圖片 src 與文字
                    updateContent(nextId);

                    // 3. Fade In: 移除 class，讓新圖片花 0.5 秒緩慢顯現
                    // 注意：這裡多加了一個非常微小的延遲（50ms），確保瀏覽器已完成 src 的切換
                    setTimeout(() => {
                        imgEl.classList.remove('fade-out');
                    }, 50);

                }, 500); // 這裡的時間（毫秒）必須大於或等於 CSS 中的 transition 時間 (0.5s = 500ms)
            }
        }

        function showEnding(id) {
            const end = endings[id];
            document.getElementById('story-view').style.display = 'none';
            const screen = document.getElementById('ending-screen');
            screen.style.display = 'block';
            document.getElementById('end-title').innerText = `結局：${end.name}`;
            document.getElementById('end-img').src = end.img;
            document.getElementById('end-desc').innerText = end.desc;
        }

        // 初始載入第一章時不需要轉場動畫
        window.onload = () => { initBg(); updateContent(1); };
