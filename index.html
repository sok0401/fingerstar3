<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>指尖星語</title>
    <style>
        body { 
            margin: 0; 
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090a1f 100%); 
            color: white; 
            font-family: 'PingFang TC', 'Light', sans-serif; 
            overflow-x: hidden;
            height: 300vh;
        }

        /* 背景粒子流動 */
        .stars-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            left: -20px;
            animation: flowing-right var(--duration) linear infinite;
            width: var(--size);
            height: var(--size);
        }
        @keyframes flowing-right {
            0% { transform: translateX(0) scale(0.5); opacity: 0; }
            10% { opacity: var(--max-opacity); }
            90% { opacity: var(--max-opacity); }
            100% { transform: translateX(110vw) scale(1.2); opacity: 0; }
        }

        /* 滑鼠粒子畫布 */
        #mouse-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 5; 
            pointer-events: none; 
        }

        .center-stage {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 800px; height: 800px;
            display: flex; justify-content: center; align-items: center;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        /* 細體標題 */
        h1 { 
            position: absolute;
            z-index: 20;
            font-size: 2.5rem; 
            font-weight: 100; 
            letter-spacing: 15px; 
            margin: 0;
            background: linear-gradient(to bottom, #fff, #a29bfe); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(162, 155, 254, 0.2);
        }

        /* 軌道樣式 */
        .orbit-container {
            position: absolute;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none;
        }
        .orbit {
            position: absolute;
            border-radius: 50%;
            border: 1.5px solid rgba(162, 155, 254, 0.4); 
            border-right-color: transparent !important; 
            opacity: 0;
            transition: opacity 1.5s ease;
            animation: orbit-autonomous-rotate var(--rotate-speed) linear infinite;
        }

        @keyframes orbit-autonomous-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(var(--direction)); }
        }

        /* 十二宮位圓盤 (純光環版) */
        .zodiac-wheel {
            width: 450px; height: 450px;
            border-radius: 50%;
            border: 2px solid rgba(162, 155, 254, 0.1); 
            background: rgba(162, 155, 254, 0.03);
            backdrop-filter: blur(5px);
            transition: all 0.8s ease;
            z-index: 10;
        }
        .zodiac-wheel.active {
            border-color: rgba(162, 155, 254, 0.7);
            box-shadow: 0 0 50px rgba(162, 155, 254, 0.4), inset 0 0 25px rgba(162, 155, 254, 0.2);
        }

        /* 淺黃色發光選單 */
        .floating-nav {
            position: absolute;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 30;
        }
        .nav-item {
            position: absolute;
            pointer-events: auto;
            color: #ddd;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: 200;
            letter-spacing: 4px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.7);
        }
        .nav-item:hover {
            color: #fffde7;
            text-shadow: 0 0 10px #fff9c4, 0 0 25px #fff176, 0 0 40px rgba(255, 241, 118, 0.5);
        }

        #link-story { top: 10%; left: 50%; }
        #link-char { top: 85%; left: 15%; }
        #link-quiz { top: 85%; left: 85%; }

        .scroll-msg {
            position: absolute;
            bottom: 8vh; width: 100%; text-align: center;
            color: #555; letter-spacing: 3px; font-size: 0.8rem;
            animation: bounce 2s infinite;
        }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} }
    </style>
</head>
<body>

    <div class="stars-container" id="stars"></div>
    <canvas id="mouse-canvas"></canvas>

    <div class="center-stage" id="stage">
        <div class="orbit-container" id="orbit-field"></div>
        <h1>指尖星語</h1>
        <nav class="floating-nav">
            <a href="story.html" class="nav-item" id="link-story">冒險故事</a>
            <a href="character.html" class="nav-item" id="link-char">角色介紹</a>
            <a href="quiz.html" class="nav-item" id="link-quiz">星命測驗</a>
        </nav>
        <div class="zodiac-wheel" id="wheel"></div>
    </div>

    <div class="scroll-msg">向下捲動 喚醒星盤</div>

    <script>
        // --- 背景星空與軌道生成 (維持不變) ---
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--size', Math.random() * 2 + 1 + 'px');
            star.style.setProperty('--max-opacity', Math.random() * 0.5 + 0.2);
            const duration = Math.random() * 40 + 30;
            star.style.setProperty('--duration', duration + 's');
            star.style.animationDelay = -Math.random() * duration + 's';
            starsContainer.appendChild(star);
        }

        const orbitField = document.getElementById('orbit-field');
        for (let i = 0; i < 10; i++) {
            const ob = document.createElement('div');
            ob.className = 'orbit';
            const size = 380 + (i * 110);
            ob.style.width = ob.style.height = size + 'px';
            ob.style.setProperty('--rotate-speed', (20 + Math.random() * 60) + 's');
            ob.style.setProperty('--direction', Math.random() > 0.5 ? '360deg' : '-360deg');
            orbitField.appendChild(ob);
        }

        // --- 修改重點：具備「引力系統」的粒子邏輯 ---
        const canvas = document.getElementById('mouse-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 1;
                this.color = `rgba(162, 155, 254, ${Math.random() * 0.4 + 0.3})`;
                this.life = 1;
            }
            update() {
                // 引力計算：計算指向螢幕中心的向量
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                const dx = centerX - this.x;
                const dy = centerY - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                // 只有在圓盤浮現後 (scrollPos > 50) 才增加引力感
                const pullStrength = 0.0005; 
                if (window.scrollY > 50) {
                    this.speedX += dx * pullStrength;
                    this.speedY += dy * pullStrength;
                }

                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.015;
                if (this.size > 0.1) this.size -= 0.03;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        window.addEventListener('mousemove', (e) => {
            for (let i = 0; i < 3; i++) {
                particles.push(new Particle(e.clientX, e.clientY));
            }
        });

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // 捲動監聽 (喚醒星盤)
        window.addEventListener('scroll', () => {
            const stage = document.getElementById('stage');
            const wheel = document.getElementById('wheel');
            const orbits = document.querySelectorAll('.orbit');
            const navItems = document.querySelectorAll('.nav-item');
            const scrollPos = window.scrollY;
            
            if (scrollPos > 50) {
                const opacity = Math.min(scrollPos / 500, 1);
                stage.style.opacity = opacity;
                wheel.style.transform = `rotate(${scrollPos / 3}deg)`;
                wheel.classList.add('active');
                orbits.forEach(orbit => { orbit.style.opacity = opacity * 0.6; });
                navItems.forEach((item, index) => {
                    if (scrollPos > 400 + index * 150) {
                        item.style.opacity = "1";
                        item.style.transform = "translate(-50%, -50%) scale(1)";
                    } else {
                        item.style.opacity = "0";
                    }
                });
            } else {
                stage.style.opacity = "0";
                wheel.classList.remove('active');
            }
        });
    </script>
</body>
</html>
